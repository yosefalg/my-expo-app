kind = "mobile"
previewPath = "/"
title = "OmniVision AI Search"
version = "1.0.0"
id = "artifacts/omnivision"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25246

[services.development]
run = "pnpm --filter @workspace/omnivision run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/omnivision", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/omnivision", "run", "serve" ]

[services.env]
PORT = "25246"
BASE_PATH = "/"

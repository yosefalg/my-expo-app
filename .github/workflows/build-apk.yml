name: Build Expo Android APK
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install project dependencies
        working-directory: artifacts/omnivision
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Create EAS Ignore File
        working-directory: artifacts/omnivision
        run: |
          echo "node_modules" > .easignore
          echo ".expo" >> .easignore
          echo ".git" >> .easignore

      - name: Prebuild Expo (Non-Interactive)
        working-directory: artifacts/omnivision
        run: npx expo prebuild --platform android --clean --no-install

      - name: Setup Expo EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK Locally
        working-directory: artifacts/omnivision
        env:
          CI: "false"
          PNPM_FLAGS: "--no-frozen-lockfile"
        run: eas build --platform android --profile preview --local --non-interactive

name: Build Expo APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install axios
        run: npm install axios

      - name: Run AI Fix Script
        continue-on-error: true
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/ai-fix.js

      - name: Commit AI Fixes
        continue-on-error: true
        run: |
          git config --global user.name "AI Bot"
          git config --global user.email "bot@example.com"
          git add .
          git diff --staged --quiet || git commit -m "AI: Auto-fix"
          git push origin main || true

      - name: Clean lockfiles in omnivision
        working-directory: artifacts/omnivision
        run: rm -f pnpm-lock.yaml package-lock.json yarn.lock

      - name: Install pnpm workspace dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Prebuild Expo Android
        working-directory: artifacts/omnivision
        run: npx expo prebuild --platform android --clean --no-install

      - name: Make gradlew executable
        working-directory: artifacts/omnivision/android
        run: chmod +x gradlew

      - name: Build APK with Gradle
        working-directory: artifacts/omnivision/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: artifacts/omnivision/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

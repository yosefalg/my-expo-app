name: Build Android APK (OmniVision)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
        working-directory: artifacts/omnivision

      - name: Prebuild Expo (Non-Interactive)
        run: npx expo prebuild --platform android --clean --no-install
        working-directory: artifacts/omnivision

      - name: Auto-Fix with AI
        run: |
          python3 -c "
          import sys, json, re
          try:
              data = json.load(sys.stdin)
              if 'choices' in data:
                  text = data['choices'][0]['message']['content']
              elif 'candidates' in data:
                  text = data['candidates'][0]['content']
              else:
                  text = ''
              
              match = re.search(r'\{.*\}', text, re.DOTALL)
              if match:
                  fix = json.loads(match.group())
                  print(fix.get('workflow', ''))
              else:
                  print('')
          except Exception as e:
              print('')
          " > /dev/null

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android App (Release)
        run: ./gradlew assembleRelease
        working-directory: artifacts/omnivision/android

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniVision-Release-APK
          path: artifacts/omnivision/android/app/build/outputs/apk/release/*.apk

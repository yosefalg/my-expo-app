name: Build APK (Local, No EAS)
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: artifacts/omnivision
        run: pnpm install --ignore-scripts

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate debug keystore
        working-directory: artifacts/omnivision
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug, O=Android, C=US" -storepass android -keypass android

      - name: Prebuild (generate android folder)
        working-directory: artifacts/omnivision
        run: npx expo prebuild --platform android --clean

      - name: Build APK with Gradle
        working-directory: artifacts/omnivision/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-local
          path: artifacts/omnivision/android/app/build/outputs/apk/release/*.apk

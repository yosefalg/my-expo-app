name: Build Expo Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_failed: ${{ steps.build.outcome == 'failure' }}
      error_log: ${{ steps.capture_error.outputs.error_log }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        id: build
        working-directory: artifacts/omnivision
        run: eas build --platform android --profile preview --non-interactive
        continue-on-error: true

      - name: Capture error log
        id: capture_error
        if: steps.build.outcome == 'failure'
        run: |
          ERROR=$(cat /tmp/eas_error.log 2>/dev/null || echo "Build step failed - check EAS logs")
          echo "error_log=$ERROR" >> $GITHUB_OUTPUT

      - name: AI Auto-Fix using Gemini (Free)
        if: steps.build.outcome == 'failure'
        env:
          GEMINI_API_KEY: "AQ.Ab8RN6IWXMwcPMRoQ3x74G9TOAXj3pOpDn1_Sx0cCaj8Icb5Hw"  # <-- التوكن المطلوب
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🤖 Asking Gemini to fix the build error..."

          WORKFLOW=$(cat .github/workflows/build-apk.yml)
          EAS_JSON=$(cat artifacts/omnivision/eas.json 2>/dev/null || echo "{}")
          APP_JSON=$(cat artifacts/omnivision/app.json 2>/dev/null || echo "{}")

          RESPONSE=$(curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H 'Content-Type: application/json' \
            -d "{
              \"contents\": [{
                \"parts\": [{
                  \"text\": \"You are a CI/CD expert. Fix this Expo EAS build error.\n\nError: ${{ steps.capture_error.outputs.error_log }}\n\nCurrent workflow:\n$WORKFLOW\n\neas.json:\n$EAS_JSON\n\napp.json:\n$APP_JSON\n\nRespond ONLY with valid JSON: {\\\"workflow\\\": \\\"full yaml content\\\", \\\"eas_json\\\": {}, \\\"explanation\\\": \\\"what was fixed\\\"}\"
                }]
              }]
            }")

          FIXED_WORKFLOW=$(echo $RESPONSE | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              text = data['candidates'][0]['content']['parts'][0]['text']
              fix = json.loads(text)
              print(fix.get('workflow', ''))
          except:
              print('')
          " 2>/dev/null)

          if [ -n "$FIXED_WORKFLOW" ]; then
            echo "$FIXED_WORKFLOW" > .github/workflows/build-apk.yml
            git config user.name "Gemini AI Bot"
            git config user.email "gemini-bot@omnivision.ai"
            git add .github/workflows/build-apk.yml
            git commit -m "🤖 Auto-fix: Gemini repaired build workflow"
            git push
            echo "✅ Gemini fixed and pushed the workflow!"
          else
            echo "⚠️ Gemini could not generate a fix. Check API key or error."
          fi

      - name: Upload APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: artifacts/omnivision/*.apk

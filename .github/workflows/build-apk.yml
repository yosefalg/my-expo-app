name: Build Expo Android APK
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install project dependencies
        working-directory: artifacts/omnivision
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Prebuild Expo (Non-Interactive)
        working-directory: artifacts/omnivision
        run: npx expo prebuild --platform android --clean --no-install

      - name: Auto-Fix JSON with AI
        run: |
          python3 -c "
          import sys, json, re
          try:
              data = json.load(sys.stdin)
              if 'choices' in data:
                  text = data['choices'][0]['message']['content']
              elif 'candidates' in data:
                  text = data['candidates'][0]['content']
              else:
                  text = ''
              
              match = re.search(r'\{.*\}', text, re.DOTALL)
              if match:
                  fix = json.loads(match.group())
                  print(fix.get('workflow', ''))
              else:
                  print('')
          except Exception as e:
              print('')
          " > /dev/null

      - name: Setup Expo EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK Locally
        working-directory: artifacts/omnivision
        env:
          # هذا السطر يمنع pnpm داخل EAS من استخدام الفحص الصارم
          PIN_HOMEPAGE: "false"
          CI: "false" 
        run: eas build --platform android --profile preview --local --non-interactive

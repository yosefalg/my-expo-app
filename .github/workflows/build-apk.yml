name: Build Expo Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK on EAS servers
        working-directory: artifacts/omnivision
        run: eas build --platform android --profile preview --non-interactive

      - name: Download APK
        working-directory: artifacts/omnivision
        run: |
          APK_URL=$(eas build:list --platform android --limit 1 --json --non-interactive | python3 -c "import sys,json; builds=json.load(sys.stdin); print(builds[0]['artifacts']['buildUrl'])")
          curl -L "$APK_URL" -o app-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: artifacts/omnivision/app-release.apk

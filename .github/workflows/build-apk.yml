name: Build Expo Android APK
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Fix and Clean Lockfile Tensions
        working-directory: artifacts/omnivision
        run: |
          # حذف ملف الـ lockfile المسبب للتضارب لإجبار السيرفر على توليد ملف نظيف متوافق
          rm -f pnpm-lock.yaml
          rm -f ../../pnpm-lock.yaml

      - name: Install project dependencies (Fresh Generation)
        working-directory: artifacts/omnivision
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Create EAS Ignore File
        working-directory: artifacts/omnivision
        run: |
          # نترك مجلد الحزم لتستعمله EAS مباشرة دون إعادة تحميل
          echo ".expo" > .easignore
          echo ".git" >> .easignore

      - name: Prebuild Expo (Non-Interactive)
        working-directory: artifacts/omnivision
        run: npx expo prebuild --platform android --clean --no-install

      - name: Setup Expo EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK Locally
        working-directory: artifacts/omnivision
        run: eas build --platform android --profile preview --local --non-interactive

name: Build Expo Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        working-directory: artifacts/omnivision
        run: pnpm install --ignore-scripts

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        id: build
        working-directory: artifacts/omnivision
        run: eas build --platform android --profile preview --non-interactive
        continue-on-error: true

      - name: Capture error log
        id: capture_error
        if: steps.build.outcome == 'failure'
        run: |
          echo "error_log=Build failed" >> $GITHUB_OUTPUT

      - name: AI Auto-Fix (Gemini)
        if: steps.build.outcome == 'failure'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🤖 Gemini fixing..."
          # Gemini سيقوم بإصلاح الملفات لاحقاً

      - name: Upload APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: artifacts/omnivision/*.apk

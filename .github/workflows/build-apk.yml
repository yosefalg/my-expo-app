name: Build Expo APK

  on:
    push:
      branches:
        - main
        - master
    workflow_dispatch:

  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 20

        - name: Setup Java 17 (required for Android local build)
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: "17"

        - name: Install pnpm
          run: npm install -g pnpm

        - name: Install axios (for AI fix script)
          run: npm install axios

        - name: Run AI Fix Script
          continue-on-error: true
          env:
            MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
            GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          run: node scripts/ai-fix.js

        - name: Commit AI Fixes (if any)
          continue-on-error: true
          run: |
            git config --global user.name "AI Bot"
            git config --global user.email "bot@example.com"
            git add .
            git diff --staged --quiet || git commit -m "AI: Auto-fix project issues"
            git push origin main || true

        - name: Clean lockfiles inside omnivision
          working-directory: artifacts/omnivision
          run: |
            rm -f pnpm-lock.yaml
            rm -f package-lock.json
            rm -f yarn.lock

        - name: Install project dependencies
          working-directory: artifacts/omnivision
          run: pnpm install --no-frozen-lockfile --ignore-scripts

        - name: Create .easignore
          working-directory: artifacts/omnivision
          run: |
            printf '.expo\n.git\nnode_modules\n' > .easignore

        - name: Setup EAS CLI
          uses: expo/expo-github-action@v8
          with:
            eas-version: latest
            token: ${{ secrets.EXPO_TOKEN }}

        - name: Prebuild Expo (Android)
          working-directory: artifacts/omnivision
          run: npx expo prebuild --platform android --clean --no-install

        - name: Build Android APK (local)
          working-directory: artifacts/omnivision
          run: eas build --platform android --profile preview --local --non-interactive

        - name: Upload APK artifact
          uses: actions/upload-artifact@v4
          with:
            name: app-release
            path: |
              artifacts/omnivision/*.apk
              artifacts/omnivision/android/app/build/outputs/apk/**/*.apk
            if-no-files-found: warn
  